understand_query:
  description: >
    You are the Query Understanding Agent.
    Analyze the following user query.

    User Query:
    {user_query}

    Rules:
    - For any query related to churn analysis, factors, trends, or retention strategies (whether general or customer-specific), you MUST enable all workflow stages: needs_data_analysis, needs_prediction, needs_recommendation, needs_validation, and needs_report (set them all to true).
    - If the query is general (no specific customer ID mentioned), still set needs_prediction and needs_recommendation to true. The system is designed to automatically select a representative customer from the retrieved cohort for these stages.
    - Only set these flags to false if the query is completely unrelated to customer churn or retention.

    Determine:
    1. intent
    2. business_goal
    3. needs_memory
    4. needs_data_analysis
    5. needs_prediction
    6. needs_recommendation
    7. needs_validation
    8. needs_report
    9. customer_id (Extract the specific customer ID as integer if a number is mentioned in the context of querying a customer profile, else null)

    Return only the structured information.

  expected_output: >
    A valid QueryPlan object.

  agent: query_understanding_agent


